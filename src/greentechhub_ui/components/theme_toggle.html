{% macro gth_theme_toggle(button_class="btn btn-sm btn-outline-secondary gth-theme-toggle") %}
<button type="button" class="{{ button_class }}" aria-label="Toggle color theme">
  <i class="bi bi-sun-fill gth-theme-toggle-icon-light" aria-hidden="true"></i>
  <i class="bi bi-moon-stars-fill gth-theme-toggle-icon-dark" aria-hidden="true"></i>
</button>
{% endmacro %}
